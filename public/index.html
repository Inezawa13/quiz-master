<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Master Panel — Podium & Pause</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080810; --surface: #10101a; --accent: #7c3aed; --gold: #f59e0b; --text: #f8fafc; --muted: #64748b; }
        body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; margin:0; display:grid; grid-template-columns:350px 1fr; height:100vh; overflow:hidden; }
        .sidebar { background:var(--surface); padding:1.5rem; border-right:1px solid rgba(255,255,255,0.1); display:flex; flex-direction:column; }
        #answer-feed { flex: 1; overflow-y: auto; margin-bottom: 1rem; }
        .final-leaderboard { background: #1a1a2e; border-top: 2px solid var(--gold); padding: 1rem; border-radius: 10px 10px 0 0; }
        .answer-item { padding:0.8rem; border-radius:10px; margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center; background: #161625; border-left: 4px solid var(--accent); }
        .main { padding:2rem; overflow-y: auto; }
        .btn { padding:0.8rem 1.2rem; border-radius:12px; border:none; font-weight:800; cursor:pointer; font-family:'Syne'; color:white; margin-right:0.5rem; }
        .btn-pause { background: #3b82f6; }
        .btn-next { background: var(--gold); color: black; }
        #timer-display { font-size: 5rem; font-family:'Syne'; font-weight:800; margin: 1rem 0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="font-family:'Syne'; color:var(--gold);">⚡ RÉPONSES</h2>
        <div id="answer-feed"></div>
        <div class="final-leaderboard">
            <h3 style="font-family:'Syne'; font-size: 0.9rem; margin-bottom:0.5rem;">🏆 TOP 5 SECRET</h3>
            <div id="top-5-list" style="font-size: 0.85rem; margin-bottom:10px;"><p style="color:var(--muted)">Aucun score...</p></div>
            <button onclick="updateLeaderboard()" style="width:100%; background:none; border:1px solid var(--gold); color:var(--gold); cursor:pointer; padding:5px; border-radius:4px;">Calculer le Top 5</button>
        </div>
    </div>
    <div class="main">
        <div style="margin-bottom:2rem;">
            <button class="btn" style="background:var(--accent)" onclick="startGame()">🚀 START</button>
            <button class="btn btn-pause" id="btn-pause" onclick="togglePause()">☕ PAUSE PIPI</button>
            <button class="btn btn-next" id="btn-next" onclick="nextQuestion()" style="display:none;">SUIVANT ⏭️</button>
            <button class="btn btn-next" id="btn-start-round" onclick="startRound()" style="display:none;">LANCER MANCHE ⚔️</button>
        </div>
        <div id="timer-display">--</div>
        <div id="round-name" style="color:var(--gold); font-family:'Syne'; font-size:1.5rem;">MANCHE 1</div>
    </div>
    <audio id="buzzer-sound" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

    <script>
        let ws; let answersReceived = 0; let scores = {}; let isPaused = false;
        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}`);
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if(data.type === 'answer_update') {
                    document.getElementById('buzzer-sound').play();
                    answersReceived++;
                    let pts = 1; 
                    if(answersReceived === 1) pts += 3;
                    if(answersReceived === 2) pts += 2;
                    if(answersReceived === 3) pts += 1;
                    if(!scores[data.playerName]) scores[data.playerName] = 0;
                    scores[data.playerName] += pts;
                    const div = document.createElement('div'); div.className = 'answer-item';
                    div.innerHTML = `<span><b>${data.playerName}</b></span> <span style="color:var(--gold)">+${pts}</span>`;
                    document.getElementById('answer-feed').prepend(div);
                }
                if(data.type === 'phase_change') {
                    if(data.phase === 'question') { answersReceived = 0; document.getElementById('answer-feed').innerHTML = ""; startTimer(data.timer || 30); }
                    if(data.phase === 'round_intro') { document.getElementById('round-name').textContent = data.roundName; }
                    document.getElementById('btn-next').style.display = (data.phase === 'question') ? 'inline-block' : 'none';
                    document.getElementById('btn-start-round').style.display = (data.phase === 'round_intro') ? 'inline-block' : 'none';
                }
            };
        }
        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('btn-pause');
            if(isPaused) { btn.style.background = "#ef4444"; btn.textContent = "▶️ REPRENDRE"; ws.send(JSON.stringify({ type: 'master_pause_on' })); }
            else { btn.style.background = "#3b82f6"; btn.textContent = "☕ PAUSE PIPI"; ws.send(JSON.stringify({ type: 'master_pause_off' })); }
        }
        function updateLeaderboard() {
            const sorted = Object.entries(scores).sort(([,a], [,b]) => b - a).slice(0, 5);
            document.getElementById('top-5-list').innerHTML = sorted.map(([name, score], i) => `<div>${i+1}. <b>${name}</b> — ${score} pts</div>`).join('');
        }
        function startTimer(sec) {
            let t = sec; const el = document.getElementById('timer-display');
            const count = setInterval(() => { t--; el.textContent = Math.max(0, t); if(t <= 0) clearInterval(count); }, 1000);
        }
        function startGame() { ws.send(JSON.stringify({ type: 'master_start_game' })); }
        function nextQuestion() { ws.send(JSON.stringify({ type: 'master_next_question' })); }
        function startRound() { ws.send(JSON.stringify({ type: 'master_start_round' })); }
        connect();
    </script>
</body>
</html>
