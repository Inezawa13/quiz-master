<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question pour un Impérien — Joueur</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080810; --surface: #10101a; --accent: #7c3aed; --gold: #f59e0b; --text: #f8fafc; --muted: #64748b; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

        /* Animation Cosmos en fond */
        .cosmos-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1a0a2e 0%, #080810 100%); overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        #setup-screen, #wait-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        
        /* Message d'attente stylé */
        .waiting-msg { font-family: 'Syne'; font-size: 1.5rem; color: var(--gold); text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        #round-transition { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .round-title-anim { font-family: 'Syne'; font-size: 2.2rem; font-weight: 800; color: var(--gold); animation: cosmosZoom 3s forwards; }
        @keyframes cosmosZoom { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1.1); opacity: 1; } }

        #game-screen { display: none; padding: 1.5rem; height: 100vh; flex-direction: column; }
        .question-box { background: rgba(16, 16, 26, 0.8); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--accent); margin-bottom: 2rem; }
        .options-grid { display: grid; gap: 1rem; width: 100%; }
        .opt-btn { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 1.2rem; border-radius: 15px; font-weight: 700; cursor: pointer; }
        .opt-btn.selected { background: var(--accent); border-color: var(--gold); }
        .btn-join { background: linear-gradient(135deg, var(--accent), #a855f7); color: white; border: none; padding: 1rem 2rem; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 1rem; }
        input { background: var(--surface); border: 1px solid var(--accent); color: white; padding: 1rem; border-radius: 12px; width: 100%; text-align: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="cosmos-bg" id="stars"></div>
    <div id="round-transition"><div id="round-anim-name" class="round-title-anim"></div></div>

    <div id="setup-screen">
        <h1 style="font-family:'Syne'; margin-bottom: 2rem;">ENTRER DANS L'ARÈNE</h1>
        <input type="text" id="player-name" placeholder="Ton pseudo de Chevalier...">
        <button class="btn-join" onclick="joinGame()">ÉVEILLER MON COSMOS</button>
    </div>

    <div id="wait-screen" style="display:none;">
        <div id="wait-content">
            <div class="waiting-msg">Méditation en cours...</div>
            <p style="margin-top:1rem; color:var(--muted)">Le Grand Pope va bientôt lancer le tournoi.</p>
        </div>
    </div>

    <div id="game-screen">
        <div class="question-box"><div id="question-text" style="font-family:'Syne'; font-size:1.2rem;">Attente...</div></div>
        <div id="options-container" class="options-grid"></div>
    </div>

    <script>
        // Création des étoiles
        const container = document.getElementById('stars');
        for(let i=0; i<50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random()*3+'px';
            star.style.left = Math.random()*100+'%';
            star.style.top = Math.random()*100+'%';
            star.style.setProperty('--d', Math.random()*3+2+'s');
            container.appendChild(star);
        }

        let ws; let myName = "";
        function joinGame() {
            myName = document.getElementById('player-name').value;
            if(!myName) return;
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}`);
            ws.onopen = () => { 
                ws.send(JSON.stringify({ type: 'join', name: myName })); 
                document.getElementById('setup-screen').style.display = 'none'; 
                document.getElementById('wait-screen').style.display = 'flex'; 
            };
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const waitContent = document.getElementById('wait-content');
                if (data.type === 'pause_on') { 
                    document.getElementById('game-screen').style.display = 'none'; document.getElementById('wait-screen').style.display = 'flex';
                    waitContent.innerHTML = `<h2 style="color:var(--gold)">⏸️ PAUSE PIPI</h2><div style="font-size:3rem; margin-top:1rem;">☕🚽</div>`;
                }
                if (data.type === 'pause_off') { 
                    waitContent.innerHTML = `<div class="waiting-msg">Reprise imminente...</div>`;
                }
                if (data.type === 'phase_change' && data.phase === 'round_intro') { showRoundAnim(data.roundName); }
                if (data.type === 'question') { showQuestion(data); }
                if (data.type === 'phase_change' && data.phase === 'wait') { document.getElementById('game-screen').style.display = 'none'; document.getElementById('wait-screen').style.display = 'flex'; }
            };
        }
        function showRoundAnim(name) {
            const trans = document.getElementById('round-transition');
            document.getElementById('round-anim-name').textContent = name;
            trans.style.display = 'flex'; setTimeout(() => { trans.style.display = 'none'; }, 3000);
        }
        function showQuestion(data) {
            document.getElementById('wait-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('question-text').textContent = data.text;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            data.options.forEach(opt => {
                const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.textContent = opt;
                btn.onclick = () => { Array.from(container.children).forEach(b => b.style.opacity = "0.5"); btn.style.opacity = "1"; btn.classList.add('selected'); ws.send(JSON.stringify({ type: 'answer', answer: opt })); };
                container.appendChild(btn);
            });
        }
    </script>
</body>
</html>
