<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Panel Maître — Question pour un Impérien</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810; --surface: #10101a; --surface2: #18182a; --surface3: #22223a;
    --accent: #7c3aed; --accent2: #a855f7; --gold: #f59e0b; --text: #f8fafc; --muted: #64748b; --border: rgba(255,255,255,.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow: hidden; }
  h1,h2,h3,h4 { font-family:'Syne',sans-serif; }

  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; }
  .layout { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - 60px); }
  
  .sidebar { background:var(--surface); border-right:1px solid var(--border); padding:1.2rem; display:flex; flex-direction:column; gap:1rem; }
  .panel { background:var(--surface2); border-radius:14px; padding:1.2rem; border:1px solid var(--border); }
  
  .btn { padding:.8rem 1.4rem; border-radius:10px; border:none; font-size:.95rem; font-weight:600; font-family:'Syne',sans-serif; cursor:pointer; transition:all .2s; color: white; text-align:center; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); }
  .btn-gold { background:var(--gold); color:#000; }
  .btn-pause { background: #3b82f6; }
  .btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border); }

  .rounds-tabs { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
  .round-tab { padding:.4rem .9rem; border-radius:8px; border:1.5px solid var(--border); background:var(--surface2); color:var(--muted); cursor:pointer; font-size:.85rem; }
  .round-tab.active { border-color:var(--gold); color:var(--gold); background:rgba(245,158,11,.1); }

  .master-timer { background:var(--surface2); border-radius:12px; padding:.8rem 1.2rem; display:flex; align-items:center; gap:1rem; border:1px solid var(--border); margin: 1rem 0; }
  .master-timer-text { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; min-width:40px; }
  .master-timer-bar-bg { flex:1; height:8px; background:var(--surface3); border-radius:100px; overflow:hidden; }
  .master-timer-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition: width 1s linear; }

  .answer-item { padding: 0.5rem; background: var(--surface3); border-radius: 8px; margin-bottom: 0.4rem; font-size: 0.85rem; border-left: 3px solid var(--accent2); display: flex; justify-content: space-between; }
  
  .final-leaderboard { background: #1a1a2e; border-top: 2px solid var(--gold); padding: 1rem; border-radius: 10px; margin-top: auto; }
</style>
</head>
<body>

  <div class="topbar">
    <span style="font-family:'Syne'; font-weight:800; color:var(--gold);">⚔️ CONTRÔLE QCM</span>
    <div>
        <button class="btn btn-pause" id="btn-pause" onclick="togglePause()">☕ PAUSE PIPI</button>
        <button class="btn btn-ghost" onclick="resetGame()">🔄 Reset</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="panel" style="flex:1; overflow-y:auto;">
        <h3 style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; margin-bottom:0.8rem;">💬 Réponses</h3>
        <div id="answer-feed"></div>
      </div>
      
      <div class="final-leaderboard">
        <h3 style="font-family:'Syne'; font-size: 0.8rem; margin-bottom:0.5rem;">🏆 TOP 5 SECRET</h3>
        <div id="top-5-list" style="font-size: 0.75rem; margin-bottom:10px;"></div>
        <button onclick="updateLeaderboard()" class="btn btn-ghost" style="width:100%; font-size:0.7rem; padding: 5px;">Calculer Finalistes</button>
      </div>
    </div>

    <div class="main-content" style="padding:1.5rem; overflow-y: auto;">
      <div style="display:flex; gap:1rem; margin-bottom:1rem;">
        <button class="btn btn-primary" onclick="startGame()">🚀 Lancer la Partie</button>
        <button class="btn btn-gold" id="btn-start-round" onclick="startRound()" style="display:none;">⚔️ Manche Suivante</button>
        <button class="btn btn-gold" id="btn-next" onclick="nextQuestion()" style="display:none;">⏭ Question Suivante</button>
      </div>

      <div class="master-timer" id="master-timer-ui" style="display:none;">
        <span id="timer-text" class="master-timer-text">30</span>
        <div class="master-timer-bar-bg"><div id="bar-fill" class="master-timer-bar" style="width:100%"></div></div>
      </div>

      <div class="rounds-tabs" id="rounds-tabs"></div>
      
      <div class="panel">
        <h3 id="current-round-title" style="color:var(--gold); margin-bottom:1rem; font-size:1rem;">Chargement...</h3>
        <div id="question-list"></div>
      </div>
    </div>
  </div>

<audio id="buzzer-sound" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

<script>
let ws;
let activeRoundTab = 0;
let answersReceived = 0;
let scores = {};
let isPaused = false;

const rounds = [
  { name: "L'Éveil de Seiya", timer: 30 },
  { name: "La Fureur d'Ikki", timer: 30 },
  { name: "Le Jugement de Saga", timer: 30 },
  { name: "La Malédiction d'Hadès", timer: 35 },
  { name: "Le Cosmos d'Athéna", timer: 40 }
];

function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);
    ws.onopen = () => {
        renderRoundTabs();
    };
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if(data.type === 'answer_update') {
            document.getElementById('buzzer-sound').play();
            answersReceived++;
            let pts = 1; 
            if(answersReceived === 1) pts += 3;
            if(answersReceived === 2) pts += 2;
            if(answersReceived === 3) pts += 1;
            if(!scores[data.playerName]) scores[data.playerName] = 0;
            scores[data.playerName] += pts;
            const div = document.createElement('div');
            div.className = 'answer-item';
            div.innerHTML = `<span><b>${data.playerName}</b></span> <span style="color:var(--gold)">+${pts}</span>`;
            document.getElementById('answer-feed').prepend(div);
        }
        if(data.type === 'phase_change') {
            if(data.phase === 'question') {
                answersReceived = 0;
                document.getElementById('answer-feed').innerHTML = "";
                startTimer(data.timer || rounds[activeRoundTab].timer);
            }
            document.getElementById('btn-next').style.display = (data.phase === 'question') ? 'block' : 'none';
            document.getElementById('btn-start-round').style.display = (data.phase === 'round_intro') ? 'block' : 'none';
            document.getElementById('master-timer-ui').style.display = (data.phase === 'question') ? 'flex' : 'none';
            if(data.phase === 'round_intro') {
                document.getElementById('current-round-title').textContent = data.roundName;
            }
        }
    };
}

function startTimer(sec) {
    let t = sec;
    const text = document.getElementById('timer-text');
    const bar = document.getElementById('bar-fill');
    text.textContent = t;
    bar.style.transition = 'none'; bar.style.width = '100%';
    setTimeout(() => { bar.style.transition = `width ${sec}s linear`; bar.style.width = '0%'; }, 50);
    const int = setInterval(() => { t--; text.textContent = Math.max(0, t); if(t <= 0) clearInterval(int); }, 1000);
}

function togglePause() {
    isPaused = !isPaused;
    const btn = document.getElementById('btn-pause');
    if(isPaused) {
        btn.style.background = "#ef4444"; btn.textContent = "▶️ REPRENDRE";
        ws.send(JSON.stringify({ type: 'master_pause_on' }));
    } else {
        btn.style.background = "#3b82f6"; btn.textContent = "☕ PAUSE PIPI";
        ws.send(JSON.stringify({ type: 'master_pause_off' }));
    }
}

function updateLeaderboard() {
    const sorted = Object.entries(scores).sort(([,a], [,b]) => b - a).slice(0, 5);
    document.getElementById('top-5-list').innerHTML = sorted.map(([name, score], i) => `<div>${i+1}. <b>${name}</b> — ${score} pts</div>`).join('');
}

function renderRoundTabs() {
    const tabs = document.getElementById('rounds-tabs');
    tabs.innerHTML = rounds.map((r, i) => `
        <div class="round-tab ${i === activeRoundTab ? 'active' : ''}" onclick="activeRoundTab=${i}; renderRoundTabs();">
            ${i+1}. ${r.name}
        </div>
    `).join('');
    document.getElementById('current-round-title').textContent = rounds[activeRoundTab].name;
}

function startGame() { ws.send(JSON.stringify({ type: 'master_start_game' })); }
function nextQuestion() { ws.send(JSON.stringify({ type: 'master_next_question' })); }
function startRound() { ws.send(JSON.stringify({ type: 'master_start_round' })); }
function resetGame() { if(confirm("Reset ?")) ws.send(JSON.stringify({ type: 'master_reset' })); }

connect();
</script>
</body>
</html>
