<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sanctuaire — Master Control</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #080810; --surface: #10101a; --accent: #7c3aed; --gold: #f59e0b; }
  body { background:var(--bg); color:white; font-family:'DM Sans',sans-serif; margin:0; display:grid; grid-template-columns: 280px 1fr; height:100vh; overflow: hidden; }
  .sidebar { background:var(--surface); border-right:2px solid var(--accent); padding:20px; display:flex; flex-direction:column; gap:20px; }
  .main { padding:25px; overflow-y:auto; }
  .panel { background:#161625; border-radius:12px; padding:15px; border:1px solid #333; }
  .btn { padding:12px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; font-family:'Syne'; color:white; text-transform: uppercase; font-size: 0.8rem; }
  .btn-gold { background:var(--gold); color:black; }
  .round-tab { padding:10px; border-radius:8px; border:1px solid #333; margin-bottom:8px; cursor:pointer; text-align:center; font-weight: bold; font-size: 0.75rem; }
  .round-tab.active { border: 2px solid var(--gold); color:var(--gold); background:rgba(245,158,11,0.1); }
  .player-tag { display:block; padding:10px; background:#05050a; border-radius:8px; margin-bottom:5px; color:var(--gold); border-left:4px solid var(--gold); font-weight: bold; }
  input { width:100%; padding:10px; margin-bottom:8px; background:#05050a; border:1px solid #333; color:white; border-radius:8px; box-sizing: border-box; }
</style>
</head>
<body>
<div class="sidebar">
    <h3 style="font-family:'Syne'; color:var(--gold); margin:0;">🛡️ CHEVALIERS (<span id="count">0</span>)</h3>
    <div id="player-list" style="flex:1; overflow-y:auto;"></div>
    <div class="panel">
        <h4 style="margin:0 0 10px 0; font-size:0.8rem;">🏆 CLASSEMENT TOP 5</h4>
        <div id="scores-list" style="font-size:0.9rem; margin-bottom:10px; color:var(--gold)"></div>
        <button class="btn btn-gold" style="width:100%" onclick="updateLeaderboard()">ACTUALISER</button>
    </div>
</div>

<div class="main">
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn" style="background:var(--accent); flex:1;" onclick="sendAction('master_start_game')">🚀 LANCER LE JEU</button>
        <button class="btn" style="background:#3b82f6; flex:1;" onclick="sendAction('master_pause_on')">☕ PAUSE</button>
        <button class="btn btn-gold" style="flex:1;" onclick="sendAction('master_next_question')">⏭ SUIVANTE</button>
    </div>
    
    <div id="rounds-container" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; margin-bottom:25px;"></div>
    
    <div style="display:grid; grid-template-columns: 1fr 300px; gap:20px;">
        <div>
            <h2 id="round-name" style="font-family:'Syne'; color:var(--gold); margin:0;"></h2>
            <div id="history" style="margin-top:15px;"></div>
        </div>
        <div class="panel">
            <h3 style="font-family:'Syne'; font-size:0.9rem; color:var(--gold);">ENVOYER UNE QUESTION</h3>
            <input type="text" id="q" placeholder="Ta question...">
            <input type="text" id="r1" placeholder="Bonne réponse">
            <input type="text" id="r2" placeholder="Fausse 1">
            <input type="text" id="r3" placeholder="Fausse 2">
            <input type="text" id="r4" placeholder="Fausse 3">
            <button class="btn btn-gold" style="width:100%; margin-top:5px;" onclick="sendQ()">ATTAQUER !</button>
        </div>
    </div>
</div>

<script>
    let ws; let activeRound = 0; let players = new Set(); let scores = {};
    const rounds = ["L'Éveil de Seiya", "La Fureur d'Ikki", "Le Jugement de Saga", "La Malédiction d'Hadès", "Le Cosmos d'Athéna"];

    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            console.log("Message reçu :", data);

            // GESTION DES JOUEURS : On accepte 'name' ou 'playerName'
            let foundName = data.name || data.playerName;
            
            if (data.type === 'player_list' && data.players) {
                data.players.forEach(p => players.add(p.name || p.playerName));
            } else if (foundName) {
                players.add(foundName);
                // Si c'est une réponse, on ajoute un point
                if (data.type === 'answer' || data.answer) {
                    scores[foundName] = (scores[foundName] || 0) + 1;
                }
            }
            updateUI();
        };
        render();
    }

    function updateUI() {
        document.getElementById('count').textContent = players.size;
        document.getElementById('player-list').innerHTML = Array.from(players).map(p => `<div class="player-tag">🛡️ ${p}</div>`).join('');
    }

    function render() {
        document.getElementById('rounds-container').innerHTML = rounds.map((r, i) => `<div class="round-tab ${i === activeRound ? 'active' : ''}" onclick="activeRound=${i}; render();">${r}</div>`).join('');
        document.getElementById('round-name').textContent = rounds[activeRound];
    }

    function sendQ() {
        const msg = { 
            type: 'question', 
            text: document.getElementById('q').value, 
            options: [document.getElementById('r1').value, document.getElementById('r2').value, document.getElementById('r3').value, document.getElementById('r4').value] 
        };
        ws.send(JSON.stringify(msg));
        document.getElementById('history').innerHTML = `<div class='panel' style='margin-bottom:10px; border-left:3px solid var(--gold)'>✅ Envoyé : ${msg.text}</div>` + document.getElementById('history').innerHTML;
        // Reset champs
        document.getElementById('q').value = ""; document.getElementById('r1').value = "";
    }

    function updateLeaderboard() {
        const s = Object.entries(scores).sort((a,b) => b[1]-a[1]).slice(0,5);
        document.getElementById('scores-list').innerHTML = s.map(([n,v]) => `<div><b>${n}</b> : ${v} pts</div>`).join('');
    }

    function sendAction(type) { ws.send(JSON.stringify({ type: type })); }

    connect();
</script>
</body>
</html>
