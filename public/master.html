<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Master Panel — Quiz SSA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070f; --surface: #11111e; --surface2: #1a1a2e;
    --accent: #7c3aed; --gold: #f59e0b;
    --green: #10b981; --red: #ef4444; --blue: #3b82f6;
    --text: #f1f5f9; --muted: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

/* AUTH */
#auth {
display:flex; flex-direction:column; align-items:center;
justify-content:center; height:100vh; gap:14px;
}
#auth h1 { font-family:‘Syne’,sans-serif; color:var(–gold); font-size:2rem; }
#auth input {
padding:12px 16px; border-radius:10px; border:1px solid #333;
background:var(–surface2); color:var(–text); font-size:1rem; width:260px; outline:none;
}
#auth button {
padding:12px 36px; border-radius:10px; background:var(–accent);
border:none; color:white; font-family:‘Syne’,sans-serif; font-size:1rem; cursor:pointer;
}
#auth-err { color:var(–red); font-size:.9rem; display:none; }

/* MAIN */
#main { display:none; grid-template-columns:280px 1fr; height:100vh; }

.sidebar {
background:var(–surface); border-right:2px solid var(–accent);
padding:18px; display:flex; flex-direction:column; gap:14px; overflow-y:auto;
}
.main { padding:22px; overflow-y:auto; display:flex; flex-direction:column; gap:20px; }

h2.title { font-family:‘Syne’,sans-serif; color:var(–gold); font-size:1rem; text-transform:uppercase; letter-spacing:1px; }

.card { background:var(–surface2); border-radius:14px; padding:14px; border:1px solid #2a2a3e; }

.btn {
padding:11px 14px; border-radius:10px; border:none;
font-weight:700; cursor:pointer; font-family:‘Syne’,sans-serif;
color:white; transition:.2s; font-size:.9rem;
}
.btn:hover { transform:translateY(-1px); filter:brightness(1.1); }
.btn:active { transform:scale(.97); }
.btn-accent { background:var(–accent); }
.btn-gold   { background:var(–gold); color:#000; }
.btn-green  { background:var(–green); }
.btn-red    { background:var(–red); }
.btn-blue   { background:var(–blue); }
.btn-full   { width:100%; }

/* JOUEURS */
.player-tag {
padding:9px 12px; border-radius:8px;
background:#0a0a14; border-left:3px solid var(–gold);
font-size:.9rem; color:var(–gold); font-weight:600;
margin-bottom:6px;
}

/* RÉPONSES */
.answer-bar-wrap { margin-top:8px; }
.answer-bar { height:8px; border-radius:4px; background:#222; overflow:hidden; }
.answer-fill { height:100%; background:var(–gold); border-radius:4px; transition:width .4s; }
.answer-num { font-family:‘Syne’,sans-serif; font-size:1.6rem; color:var(–gold); text-align:center; }

/* CLASSEMENT SIDEBAR */
.lb-row { font-size:.9rem; padding:4px 0; border-bottom:1px solid #1e1e30; }
.lb-row:last-child { border:none; }

/* STATUS */
.status-pill {
display:inline-block; padding:5px 12px; border-radius:100px;
font-size:.8rem; font-weight:700; font-family:‘Syne’,sans-serif;
}
.s-waiting    { background:rgba(59,130,246,.2); color:var(–blue); border:1px solid var(–blue); }
.s-question   { background:rgba(124,58,237,.2); color:#a855f7; border:1px solid #a855f7; }
.s-answer     { background:rgba(16,185,129,.2); color:var(–green); border:1px solid var(–green); }
.s-leaderboard{ background:rgba(245,158,11,.2); color:var(–gold); border:1px solid var(–gold); }

/* QUESTIONS EDITOR */
.round-tab {
padding:9px 12px; border-radius:8px; border:1px solid #333;
cursor:pointer; font-size:.82rem; text-align:center;
font-weight:700; transition:.2s; background:var(–surface2);
}
.round-tab.active { border-color:var(–gold); color:var(–gold); background:rgba(245,158,11,.1); }

.q-row {
background:#0a0a14; border-radius:10px; padding:12px;
margin-bottom:8px; border-left:3px solid var(–accent);
display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
font-size:.9rem;
}
.q-row .correct { color:var(–green); font-size:.8rem; margin-top:3px; }

input[type=“text”], input[type=“number”], textarea {
width:100%; padding:10px 12px; border-radius:8px;
background:#0a0a14; border:1px solid #333; color:var(–text);
font-family:‘DM Sans’,sans-serif; font-size:.95rem; outline:none;
transition:border .2s;
}
input:focus, textarea:focus { border-color:var(–accent); }
textarea { resize:vertical; min-height:60px; }

.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.grid-5 { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }

label { font-size:.78rem; color:var(–muted); text-transform:uppercase; display:block; margin-bottom:4px; }
</style>

</head>

<div class="card">
  <h2 class="title" style="margin-bottom:12px;">📝 Questions par manche</h2>

  <div class="grid-5" id="round-tabs" style="margin-bottom:16px;"></div>

<script>
  let ws;
  let rounds = [
    { name:"L'Éveil de Seiya",      questions:[] },
    { name:"La Fureur d'Ikki",       questions:[] },
    { name:"Le Jugement de Saga",    questions:[] },
    { name:"La Malédiction d'Hadès", questions:[] },
    { name:"Le Cosmos d'Athéna",     questions:[] },
  ];
  let activeRound = 0;

  // ── AUTH ────────────────────────────────────────
  function auth() {
    const pwd = document.getElementById('auth-pwd').value;
    connect(pwd);
  }

  function connect(pwd) {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}`);
    ws.onopen = () => ws.send(JSON.stringify({ type: 'master_auth', password: pwd }));
    ws.onmessage = e => handle(JSON.parse(e.data));
    ws.onclose = () => { if (document.getElementById('main').style.display !== 'none') setTimeout(() => connect(document.getElementById('auth-pwd').value), 2000); };
  }

  // ── MESSAGES ────────────────────────────────────
  function handle(d) {
    switch (d.type) {

      case 'master_ok':
        document.getElementById('auth').style.display = 'none';
        document.getElementById('main').style.display = 'grid';
        updatePlayers(d.players);
        updateLb(d.leaderboard);
        // Charge les rounds existants si présents
        if (d.rounds && d.rounds.length) {
          rounds = d.rounds;
          renderRoundTabs();
          renderQuestions();
        } else {
          renderRoundTabs();
        }
        break;

      case 'master_fail':
        document.getElementById('auth-err').style.display = 'block';
        break;

      case 'player_joined':
        updatePlayers(d.players);
        updateLb(d.leaderboard);
        break;

      case 'answer_count':
        document.getElementById('ans-count').textContent = d.count;
        document.getElementById('ans-total').textContent = d.total;
        const pct = d.total > 0 ? (d.count / d.total * 100) : 0;
        document.getElementById('ans-fill').style.width = pct + '%';
        break;

      case 'phase_change': break;

      case 'rounds_loaded':
        showToast('✅ Manches sauvegardées !');
        break;

      case 'game_started':
        setStatus('question', '🚀 Partie lancée');
        break;

      case 'question':
        setStatus('question', `Q${d.index}/${d.total} — ${d.round}`);
        document.getElementById('ans-count').textContent = '0';
        document.getElementById('ans-fill').style.width = '0%';
        break;

      case 'answer_revealed':
        setStatus('answer', '✅ Réponse révélée');
        updateLb(d.leaderboard);
        break;

      case 'leaderboard':
        setStatus('leaderboard', '🏆 Classement affiché');
        updateLb(d.leaderboard);
        break;

      case 'game_end':
        setStatus('leaderboard', '🏁 Partie terminée');
        updateLb(d.leaderboard);
        break;
    }
  }

  function send(type) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type }));
  }

  // ── JOUEURS ─────────────────────────────────────
  function updatePlayers(players) {
    document.getElementById('player-count').textContent = players.length;
    document.getElementById('ans-total').textContent = players.length;
    document.getElementById('player-list').innerHTML = players.map(p =>
      `<div class="player-tag">🛡️ ${p.name}</div>`
    ).join('');
  }

  function updateLb(lb) {
    document.getElementById('lb-sidebar').innerHTML = lb.slice(0,5).map((p,i) =>
      `<div class="lb-row">${i+1}. <b>${p.name}</b> — ${p.score} pts</div>`
    ).join('');
  }

  // ── STATUS ──────────────────────────────────────
  function setStatus(type, text) {
    const el = document.getElementById('status-pill');
    el.className = 'status-pill s-' + type;
    el.textContent = text;
  }

  // ── ÉDITEUR QUESTIONS ───────────────────────────
  function renderRoundTabs() {
    document.getElementById('round-tabs').innerHTML = rounds.map((r,i) =>
      `<div class="round-tab ${i===activeRound?'active':''}" onclick="activeRound=${i};renderRoundTabs();renderQuestions();">${r.name.split(' ')[0]}<br><small style="font-weight:400;font-size:.7rem;">${rounds[i].questions.length} Q</small></div>`
    ).join('');
  }

  function renderQuestions() {
    const qs = rounds[activeRound].questions;
    document.getElementById('q-list').innerHTML = qs.length === 0
      ? '<p style="color:var(--muted);font-size:.9rem;">Aucune question pour cette manche</p>'
      : qs.map((q,i) =>
        `<div class="q-row">
          <div>
            <b>Q${i+1}.</b> ${q.text}
            <div class="correct">✅ ${q.correct}</div>
          </div>
          <button class="btn btn-red" style="padding:5px 10px;font-size:.75rem;" onclick="removeQ(${i})">✕</button>
        </div>`
      ).join('');
    renderRoundTabs();
  }

  function addQuestion() {
    const text    = document.getElementById('q-text').value.trim();
    const correct = document.getElementById('q-correct').value.trim();
    const w1      = document.getElementById('q-w1').value.trim();
    const w2      = document.getElementById('q-w2').value.trim();
    const w3      = document.getElementById('q-w3').value.trim();
    const pts     = parseInt(document.getElementById('q-pts').value) || 100;

    if (!text || !correct) return alert('Il faut au moins la question et la bonne réponse !');

    const choices = [correct, w1, w2, w3].filter(Boolean).sort(() => Math.random() - .5);

    rounds[activeRound].questions.push({ text, correct, choices, points: pts });
    renderQuestions();

    // Vide les champs
    ['q-text','q-correct','q-w1','q-w2','q-w3','q-pts'].forEach(id => document.getElementById(id).value = '');
  }

  function removeQ(index) {
    rounds[activeRound].questions.splice(index, 1);
    renderQuestions();
  }

  function saveRounds() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'load_rounds', rounds }));
    }
  }

  // ── TOAST ────────────────────────────────────────
  function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:10px 20px;border-radius:10px;font-family:Syne,sans-serif;font-weight:700;z-index:999;animation:slideUp .3s ease;';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }
</script>
